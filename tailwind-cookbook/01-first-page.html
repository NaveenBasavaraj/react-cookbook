<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<title>Neetcode</title>

<body>
    <div class="flex flex-col h-screen bg-white">
        <!-- 1. Navbar -->
        <nav class="flex items-center px-4 py-4 border-b border-gray-200 shrink-0 gap-8">
            <div class="text-xl font-bold text-gray-900">NeetCode 🚀</div>

            <div class="flex gap-3">
                <a href="#"
                    class="text-sm text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-full px-4 py-1.5">Problems</a>
                <a href="#"
                    class="text-sm text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-full px-4 py-1.5">Courses</a>
            </div>

            <!-- This pushes the button to the right -->
            <div class="ml-auto">
                <button class="text-sm bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">Get Pro</button>
            </div>
        </nav>

        <!-- 2. Body: sidebar + main content side by side -->
        <div class="flex flex-1 overflow-hidden">

            <!-- 2a. Sidebar -->
            <aside class="w-56 shrink-0 border-r border-gray-200 overflow-y-auto p-4">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Menu</p>
                <a href="#"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-100 text-sm font-medium text-gray-900 mb-1">Dashboard</a>
                <a href="#"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50 mb-1">Problems</a>
                <a href="#"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50 mb-1">Progress</a>
                <a href="#"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50 mb-1">Settings</a>
            </aside>

            <!-- 2b. Main content area -->
            <main class="flex-1 min-w-0 overflow-y-auto p-6 bg-gray-50">
                <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1">Welcome back.</p>
            </main>

        </div>
    </div>
</body>

</html>
